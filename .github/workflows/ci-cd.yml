name: CI-CD Restaurant Pipeline

on:
  push:
    branches: ["main", "blackboxai/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start services
        run: docker compose up --build -d

      - name: Wait for services
        run: sleep 10

      - name: Health checks
        run: |
          curl -fsS http://localhost:5001/health
          curl -fsS http://localhost:5002/health
          curl -fsS http://localhost:5003/health
          curl -fsS http://localhost:8080

      - name: API happy path tests
        run: |
          echo '{"name":"QA User","email":"qa_ci@example.com","password":"123456"}' > samples/auth_register.json
          curl -fsS -X POST http://localhost:5001/api/auth/register \
            -H "Content-Type: application/json" \
            --data @samples/auth_register.json

          echo '{"email":"qa_ci@example.com","password":"123456"}' > samples/auth_login.json
          curl -fsS -X POST http://localhost:5001/api/auth/login \
            -H "Content-Type: application/json" \
            --data @samples/auth_login.json

          curl -fsS "http://localhost:5002/api/reservations/availability?date=2026-06-01&time=19:00&party_size=2"

          echo '{"customer_id":1,"date":"2026-06-01","time":"19:00","party_size":2}' > samples/reservation_create.json
          curl -fsS -X POST http://localhost:5002/api/reservations/ \
            -H "Content-Type: application/json" \
            --data @samples/reservation_create.json

          curl -fsS http://localhost:5003/api/menu/

          echo '{"customer_id":1,"items":[{"product_id":"P001","quantity":1}]}' > samples/order_create.json
          curl -fsS -X POST http://localhost:5003/api/orders/ \
            -H "Content-Type: application/json" \
            --data @samples/order_create.json

      - name: API error path tests
        run: |
          echo '{"email":"qa_ci@example.com","password":"wrong"}' > samples/auth_login_bad.json
          curl -s -o /tmp/auth_bad.out -w "%{http_code}" -X POST http://localhost:5001/api/auth/login \
            -H "Content-Type: application/json" \
            --data @samples/auth_login_bad.json | grep -q "401"

          echo '{"customer_id":1,"date":"2026-06-01","time":"19:00"}' > samples/reservation_bad.json
          curl -s -o /tmp/res_bad.out -w "%{http_code}" -X POST http://localhost:5002/api/reservations/ \
            -H "Content-Type: application/json" \
            --data @samples/reservation_bad.json | grep -q "400"

          echo '{"customer_id":1,"items":[{"product_id":"BAD","quantity":1}]}' > samples/order_bad.json
          curl -s -o /tmp/order_bad.out -w "%{http_code}" -X POST http://localhost:5003/api/orders/ \
            -H "Content-Type: application/json" \
            --data @samples/order_bad.json | grep -q "404"

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --tail 200

      - name: Stop services
        if: always()
        run: docker compose down -v
